name: Build Android APK

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        sdkmanager "ndk;25.1.8937393"

    - name: Install gdown for Google Drive download
      run: pip install gdown

    - name: Download dependencies from Google Drive
      run: |
        # 下载并解压 models
        gdown --folder "https://drive.google.com/drive/folders/1g-Q_i7cf6Ua4KX9ZM6V282EEZvTVVfF7" -O ./temp_deps
        
        # 解压到对应目录
        if [ -f ./temp_deps/models.zip ]; then
          unzip -o ./temp_deps/models.zip -d ./app/src/main/assets/models/
        fi
        if [ -f ./temp_deps/subpack.zip ]; then
          unzip -o ./temp_deps/subpack.zip -d ./app/src/main/assets/subpack/
        fi
        if [ -f ./temp_deps/jniLibs.zip ]; then
          unzip -o ./temp_deps/jniLibs.zip -d ./app/src/main/jniLibs/
        fi
        
        # 列出下载的文件用于调试
        echo "Downloaded files:"
        ls -la ./temp_deps/ || echo "No temp_deps folder"

    - name: Create local.properties
      run: |
        echo "GITHUB_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}" > local.properties
        echo "sdk.dir=$ANDROID_HOME" >> local.properties

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true  # Release 可能需要签名，允许失败

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
