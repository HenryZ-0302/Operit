name: Build Android APK

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        sdkmanager "ndk;25.1.8937393"

    - name: Install gdown for Google Drive download
      run: pip install gdown

    - name: Download dependencies from Google Drive
      run: |
        # 下载依赖
        gdown --folder "https://drive.google.com/drive/folders/1g-Q_i7cf6Ua4KX9ZM6V282EEZvTVVfF7" -O ./temp_deps
        
        # 列出下载的文件用于调试
        echo "Downloaded files:"
        ls -la ./temp_deps/ || echo "No temp_deps folder"
        
        # 解压并修复目录结构
        mkdir -p ./temp_extract
        
        # 解压 models
        if [ -f ./temp_deps/models.zip ]; then
          unzip -o ./temp_deps/models.zip -d ./temp_extract/models_temp
          # 查找并复制实际内容（跳过可能的嵌套目录）
          find ./temp_extract/models_temp -name "*.mnn" -o -name "*.bin" -o -name "*.json" | head -1 | xargs -I {} dirname {} | xargs -I {} cp -r {}/* ./app/src/main/assets/models/ 2>/dev/null || cp -r ./temp_extract/models_temp/* ./app/src/main/assets/models/
        fi
        
        # 解压 subpack
        if [ -f ./temp_deps/subpack.zip ]; then
          unzip -o ./temp_deps/subpack.zip -d ./temp_extract/subpack_temp
          cp -r ./temp_extract/subpack_temp/* ./app/src/main/assets/subpack/ 2>/dev/null || true
        fi
        
        # 解压 jniLibs - 正确处理 ABI 目录结构
        if [ -f ./temp_deps/jniLibs.zip ]; then
          unzip -o ./temp_deps/jniLibs.zip -d ./temp_extract/jniLibs_temp
          echo "jniLibs extracted structure:"
          find ./temp_extract/jniLibs_temp -type f -name "*.so" | head -5
          # 查找包含 .so 文件的 ABI 目录并正确复制
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            src_dir=$(find ./temp_extract/jniLibs_temp -type d -name "$abi" | head -1)
            if [ -n "$src_dir" ]; then
              mkdir -p ./app/src/main/jniLibs/$abi
              cp -r "$src_dir"/* ./app/src/main/jniLibs/$abi/
              echo "Copied $abi libs"
            fi
          done
        fi
        
        # 显示最终目录结构
        echo "Final jniLibs structure:"
        ls -la ./app/src/main/jniLibs/ || echo "jniLibs dir not found"
        ls -la ./app/src/main/jniLibs/arm64-v8a/ 2>/dev/null | head -5 || echo "No arm64-v8a"

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

    - name: Create local.properties
      run: |
        echo "GITHUB_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}" > local.properties
        echo "sdk.dir=$ANDROID_HOME" >> local.properties
        echo "RELEASE_STORE_FILE=${{ github.workspace }}/release.keystore" >> local.properties
        echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
        echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
        echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
